<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Grade</title>
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
</head>

<body>
  <nav class="flex row item-center px-2">
    <div class="flex row item-center">
      <img src="../images/logo.png" alt="Logo" class="pointer">
      <h1 class="m-0 ml-2">Easy Grade</h1>
    </div>
  </nav>

  <div class="container mt-5">
    <div>
      <label for="maxScore">ពិន្ទុសរុប</label>
      <select name="" id="maxScore">
        <option value=""></option>
      </select>
      <label for="isOrder" class="ml-5">តម្រៀប</label>
      <input type="checkbox" name="" id="isOrder">
    </div>
    <div class="flex row gap-4">
      <div class="flex column basis-5">
        <label for="studentList">ឈ្មោះ ភេទ ពិន្ទុ</label>
        <textarea name="studentList" id="studentList" rows="15"></textarea>
      </div>
      <div class="flex column basis-5">
        <label for="result">លទ្ធផល</label>
        <textarea name="result" id="result" rows="15" readonly></textarea>
      </div>
    </div>

    <div id="total"></div>
    <button id="copy" hidden>ចម្លង</button>
    <button id="downloadCsv" hidden>ទាញយក CSV</button>
  </div>

  <script type="module" src="index.ts"></script>
</body>

</html>
